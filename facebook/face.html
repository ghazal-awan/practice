<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color:#0353a4 ;
        }
    
        h1{
            position: absolute;
            color: rgb(255, 255, 255);
            margin-top: 200px;
            margin-left: 100px;
           font-size: 400%;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        

        }
        p { 
            position: absolute;
           color: rgb(135, 135, 135);
           font-size: large;
           margin-top: 270px;
           margin-left: 105px;
       
        }
        .form {
          border: 2px solid;
         padding :40px;
          width :fit-content;
          height: 300px;
          border-color: aliceblue;
          border-radius: 20px;
           border-style: hidden;
           background-color: rgb(255, 255, 255);
           margin-left: 55%;
           margin-top: 10%;
           margin-right: 20%;
           position: absolute;
         }
         .emoji{
            margin-left: 35%;
         }
       .form input {
        margin-top: 20px;
        width: 290px;
        height: 30px;
        border: 2px solid rgb(78, 179, 242);
        border-radius: 20px;
        text-align: center;

       }
    .log{
        margin-top: 10px;
        display: block;
        width: 290px;
        border-radius:20px;
        border-style: hidden;
        height: 30px ;
        background-color: #0353a4;
        color: aliceblue;

    }
    .create{
        margin-top: 10px;
        display: block;
        width: 300px;
         border-style: hidden;
        height: 50px ;
      border-style: hidden;
       height: 35px ;
      border-radius:20px;
      background-color: rgb(13, 160, 5);
      color: aliceblue;
    
        

    }

        
    </style>
</head>
<body>
   <h1>Facebook</h1>
   <p class="para">Connect with friends and the world <br> around you on Facebook</p> 
   <aside class="form">
      <input type="text" placeholder="Email">
      <br>
      <input type="password" placeholder="password">
      <br>
      <button class="log"> Login</button>
      <input type="text" placeholder="Forgot password?">
      <br>
      <button class="create">Create a new account</button>
</aside>
</body>
</html>
