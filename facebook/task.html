<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>

    .container{
        height: 300px;
        background-color: bisque;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        font-size: larger;
    }
    .box{
        padding: 20px;
        border: 2px solid black;
        border-radius: 20px;
        
    }
    .box:nth-child(1) {background-color: aqua;
    }
     .box:nth-child(2) {background-color: rgb(211, 153, 212);
    }
     .box:nth-child(3) {background-color: aqua;
    }
</style>
<body>
    <div class="container">
        <div class="box">HTML</div>
        <div class="box">CSS</div>
       <div class="box">Javascript</div>
    </div>
</body>
</html>
