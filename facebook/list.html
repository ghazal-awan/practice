<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
body{
    background-color: aliceblue;
}
.container{
    margin-top: 10px;
    border-radius: 20px;
   height: 40vh;
padding: 50px;
display: grid;
grid-template-columns: 1fr 1fr 1fr 1fr;
background-color: rgb(0, 0, 0);
gap: 50px;

}
.box{

    border: 2px solid white;
    padding: 50px;
    text-align: center;
    background-color: rgb(0, 0, 0);
    border-radius: 10%;
    box-shadow: 0px 4px 10px rgb(176, 176, 176);
}
.box a{
    color: aliceblue;
}
.box:hover{
    background-color: rgba(46, 46, 46, 0.801);
}
</style>
<body>
    <div class="container">
        <div class="box"><a href="">BTC</a></div>
        <div class="box"><a href="">ETH</a></div>
         <div class="box"><a href="">GOLD</a></div>
          <div class="box"><a href="">SOL</a></div>
    </div>
</body>
</html>
